{{ define "report-filter" }}
<section class="panel" style="padding:12px 16px;margin-bottom:0">
	<form class="search-form" method="GET" style="flex-wrap:wrap;gap:8px">
		<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-muted)">
			<span>From</span>
			<input type="date" name="from" value="{{ .Filter.From }}" style="padding:5px 8px">
		</label>
		<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-muted)">
			<span>To</span>
			<input type="date" name="to" value="{{ .Filter.To }}" style="padding:5px 8px">
		</label>
		{{ if .Warehouses }}
		<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-muted)">
			<span>Warehouse</span>
			<select name="warehouse_id" style="padding:5px 8px">
				<option value="0">All Warehouses</option>
				{{ range .Warehouses }}
				<option value="{{ .ID }}" {{ if eq $.Filter.WarehouseID .ID }}selected{{ end }}>{{ .Name }}</option>
				{{ end }}
			</select>
		</label>
		{{ end }}
		{{ if .Products }}
		<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-muted)">
			<span>Product</span>
			<select name="product_id" style="padding:5px 8px">
				<option value="0">All Products</option>
				{{ range .Products }}
				<option value="{{ .ID }}" {{ if eq $.Filter.ProductID .ID }}selected{{ end }}>{{ .Name }}</option>
				{{ end }}
			</select>
		</label>
		{{ end }}
		{{ if .ShowDays }}
		<label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--text-muted)">
			<span>Stale After</span>
			<select name="days" style="padding:5px 8px">
				<option value="30" {{ if eq .Filter.Days 30 }}selected{{ end }}>30 days</option>
				<option value="60" {{ if eq .Filter.Days 60 }}selected{{ end }}>60 days</option>
				<option value="90" {{ if eq .Filter.Days 90 }}selected{{ end }}>90 days</option>
				<option value="180" {{ if eq .Filter.Days 180 }}selected{{ end }}>180 days</option>
			</select>
		</label>
		{{ end }}
		<div style="display:flex;align-items:flex-end">
			<button class="button" type="submit">Apply</button>
		</div>
		{{ if .ExportType }}
		<div style="display:flex;align-items:flex-end;gap:6px">
			<a class="button button--muted" target="_blank"
				href="{{ .ExportBase }}?type={{ .ExportType }}&format=csv&from={{ .Filter.From }}&to={{ .Filter.To }}&warehouse_id={{ .Filter.WarehouseID }}">
				↓ CSV
			</a>
			<a class="button button--muted" target="_blank"
				href="{{ .ExportBase }}?type={{ .ExportType }}&format=pdf&from={{ .Filter.From }}&to={{ .Filter.To }}&warehouse_id={{ .Filter.WarehouseID }}">
				↓ PDF
			</a>
		</div>
		{{ end }}
	</form>
</section>
{{ end }}
