version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-invobill_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-invobill}
      MYSQL_USER: ${MYSQL_USER:-invobill}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-invobill_pass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  invobill:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - app_data:/app/data
    environment:
      PORT: "8080"
      DATABASE_DSN: "${MYSQL_USER:-invobill}:${MYSQL_PASSWORD:-invobill_pass}@tcp(db:3306)/${MYSQL_DATABASE:-invobill}?parseTime=true&charset=utf8mb4"
      GST_SELLER_NAME: "${GST_SELLER_NAME:-InvoBill Company}"
      GST_SELLER_GSTIN: "${GST_SELLER_GSTIN:-}"
      GST_SELLER_ADDRESS: "${GST_SELLER_ADDRESS:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@invobill.in}"
      CONTACT_EMAIL: "${CONTACT_EMAIL:-}"
      HTTPS: "${HTTPS:-false}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: mysql:8.0
    restart: "no"
    profiles: ["backup"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    environment:
      MYSQL_PWD: "${MYSQL_ROOT_PASSWORD:-invobill_secret}"
    entrypoint: >
      sh -c "mysqldump -h db -u root --single-transaction --routines
        ${MYSQL_DATABASE:-invobill} | gzip > /backups/invobill_$$(date +%Y%m%d_%H%M%S).sql.gz
        && echo Backup complete"

volumes:
  db_data:
  app_data:
